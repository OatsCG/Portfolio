<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Visualizer</title>
    <style>
        /* Test script for the particle visualizer background */
        /* Make canvas fill the whole screen */
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            background-color: #000;

        }

        canvas {
            display: block;
        }

        /* Button styles */
        #controls {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
    <link rel="stylesheet" href="sectionvars.css">
    <link rel="stylesheet" href="carousel.css">
    <link rel="stylesheet" href="home/homeSection.css">
    <link rel="stylesheet" href="openmusic/openmusicSection.css">
    <link rel="stylesheet" href="carpass/carpassSection.css">
    <link rel="stylesheet" href="utmsports/unisportsSection.css">
    <link rel="stylesheet" href="contact/contactSection.css">
    <link rel="stylesheet" href="modal/modal.css">
</head>

<body>
    <div id="controls">
        <button onclick="setStraightMode()">Straight</button>
        <button onclick="setFlowMode()">Flow</button>
        <button onclick="setWaveMode()">Wave</button>
        <button onclick="setBlueFlowMode()">Blue Flow</button>
        <button onclick="setClockwiseCircleMode()">Clockwise</button>
        <button onclick="setClockwiseOffsetCircleMode()">AboutMode</button>
        <button id="toggleanimation" style="z-index: 100; pointer-events: all;"
            onclick="remove10k()">
            -
        </button>
        <b id="particleCount" style="color: white">10000</b>
        <button style="z-index: 100; pointer-events: all;"
            onclick="add10k()">
            +
        </button>
        <button style="z-index: 100; pointer-events: all;"
            onclick="toggleAnimation(false)">
            Toggle
        </button>
    </div>
    
    <canvas id="particleCanvasBG" class="particleCanvas" style="filter: blur(2rem) saturate(300%); pointer-events: none;"></canvas>
    <canvas id="particleCanvas" class="particleCanvas"></canvas>

    <script src="particles/config.js"></script>
    <script src="particles/CanvasFrontend.js"></script>
    <script src="particles/directionField.js"></script>
    <script src="particles/particles.js"></script>
    <script src="particles/mouse.js"></script>
    <script src="particles/modes.js"></script>
    <script src="particles/main.js"></script>
</body>

</html>
